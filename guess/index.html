<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blind Country Guess — Guess 4 Countries</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <div class="card" id="mapcard">
    <h1>Blind Country Guess</h1>
    <p>Click the map where you think the named country is. There are no borders shown. After 4 guesses you'll see results.</p>
    <div id="map"></div>
  </div>

  <div class="card" id="side">
    <div id="stateArea"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="main.js"></script>
</body>
</html>
